name: Build & Release

on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  # Auto-bump: runs only on push to main (not tags, not manual)
  bump:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 scripts/auto_bump.py

  # Build: runs only on tag push
  build-macos-arm64:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-14   # Apple Silicon (ARM64)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --windowed --onedir --noconfirm --clean \
            --name=SheetPic --icon=icon.icns \
            --exclude-module tqdm --exclude-module setuptools \
            --exclude-module unittest --exclude-module test \
            --exclude-module distutils --exclude-module lib2to3 \
            --exclude-module pydoc --exclude-module tkinter.test \
            --exclude-module numpy.testing \
            --hidden-import xlrd --hidden-import lxml --hidden-import lxml.etree --hidden-import lxml.html \
            --hidden-import tkinterdnd2 \
            sheetpic.py

      - name: Set version in Info.plist
        run: |
          VERSION=$(sed -n 's/.*APP_VERSION *= *"\([^"]*\)".*/\1/p' sheetpic.py)
          PLIST="dist/SheetPic.app/Contents/Info.plist"
          sed -i '' "s/<string>0.0.0</<string>${VERSION}</g" "$PLIST"
          if ! grep -q "CFBundleShortVersionString" "$PLIST"; then
            sed -i '' "s|</dict>|<key>CFBundleShortVersionString</key><string>${VERSION}</string></dict>|" "$PLIST"
          fi

      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - dist/SheetPic.app
          codesign --verify --deep --strict dist/SheetPic.app || true

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -r dist/SheetPic.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "SheetPic" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            dist/SheetPic-macOS-ARM64.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macOS-ARM64
          path: dist/SheetPic-macOS-ARM64.dmg

  build-windows:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --windowed --onefile --noconfirm --clean --name=SheetPic \
            --icon=icon.ico \
            --exclude-module tqdm --exclude-module setuptools \
            --exclude-module unittest --exclude-module test \
            --exclude-module distutils --exclude-module lib2to3 \
            --exclude-module pydoc --exclude-module tkinter.test \
            --exclude-module numpy.testing \
            --hidden-import xlrd --hidden-import lxml --hidden-import lxml.etree --hidden-import lxml.html \
            --hidden-import tkinterdnd2 \
            sheetpic.py

      - name: Rename EXE
        run: mv dist/SheetPic.exe dist/SheetPic-Windows-x64.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Windows-x64
          path: dist/SheetPic-Windows-x64.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos-arm64, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from source
        id: version
        run: |
          VERSION=$(sed -n 's/.*APP_VERSION *= *"\([^"]*\)".*/\1/p' sheetpic.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts (unzip DMG/EXE from artifact ZIPs)
        run: |
          mkdir -p release_files
          find artifacts -name '*.dmg' -exec cp {} release_files/ \;
          find artifacts -name '*.exe' -exec cp {} release_files/ \;
          ls -lh release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "SheetPic ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: release_files/*
